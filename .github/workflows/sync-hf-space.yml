name: Sync Demo to HF Space

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "vite.config.js"
      - ".github/workflows/sync-hf-space.yml"
  workflow_dispatch:
    inputs:
      transformers_ref:
        description: "transformers.js ref (branch/tag/SHA)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TRANSFORMERS_REPO: ${{ vars.TRANSFORMERS_REPO || 'ysdede/transformers.js' }}
      TRANSFORMERS_REPO_REF: ${{ github.event.inputs.transformers_ref || vars.TRANSFORMERS_REPO_REF || 'v4-nemo-conformer-tdt-main-r2' }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: tdt-webgpu-demo
          lfs: true

      - name: Checkout transformers.js source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TRANSFORMERS_REPO }}
          ref: ${{ env.TRANSFORMERS_REPO_REF }}
          path: transformers.js
          token: ${{ secrets.TRANSFORMERS_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tdt-webgpu-demo/package-lock.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Install and build transformers.js (skip typegen)
        working-directory: transformers.js
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @huggingface/transformers exec node scripts/build.mjs

      - name: Install demo dependencies
        working-directory: tdt-webgpu-demo
        run: npm ci

      - name: Build demo using remote transformers.js branch
        working-directory: tdt-webgpu-demo
        env:
          TRANSFORMERS_LOCAL: "true"
          VITE_BASE_PATH: "/"
        run: npm run build

      - name: Create HF export
        run: |
          set -euo pipefail
          rm -rf hf_export && mkdir -p hf_export

          # Copy demo source (exclude dev artifacts), like parakeet.js-demo
          rsync -a \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.git' \
            --exclude='.pytest_cache' \
            --exclude='.serena' \
            --exclude='.vscode' \
            --exclude='docs' \
            --exclude='scripts' \
            --exclude='tmp_hf_space' \
            tdt-webgpu-demo/ hf_export/

          # Remove COI serviceworker (HF provides headers via custom_headers)
          sed -i '/coi-serviceworker\.js/d' hf_export/index.html
          rm -f hf_export/public/coi-serviceworker.js 2>/dev/null || true

          # Remove lockfile so HF install resolves deps (app_build_command)
          rm -f hf_export/package-lock.json

          # Keep large wasm artifacts in LFS for HF repo limits
          cat > hf_export/.gitattributes << 'ATTRSEOF'
          *.wasm filter=lfs diff=lfs merge=lfs -text
          ATTRSEOF

          # Also push pre-built dist so app works before/without HF build
          cp -r tdt-webgpu-demo/dist hf_export/dist
          sed -i '/coi-serviceworker\.js/d' hf_export/dist/index.html
          rm -f hf_export/dist/coi-serviceworker.js

          echo "HF export ready (source + dist)"
          find hf_export -maxdepth 2 -not -path '*/node_modules/*' | head -40

      - name: Write HF-specific files
        run: |
          cat > hf_export/README.md << 'READMEEOF'
          ---
          title: Transformers.js v4 Parakeet TDT Demo
          emoji: 🎙️
          colorFrom: blue
          colorTo: indigo
          sdk: static
          pinned: true
          header: mini
          fullWidth: true
          app_build_command: npm install && npm run build
          app_file: dist/index.html
          license: mit
          short_description: Browser ASR demo built from transformers.js TDT branch
          models:
          - ysdede/parakeet-tdt-0.6b-v2-onnx-tfjs4
          tags:
          - transformers-js
          - webgpu
          - wasm
          - speech-recognition
          - asr
          - nemo
          - nemo-conformer-tdt
          custom_headers:
            cross-origin-embedder-policy: credentialless
            cross-origin-opener-policy: same-origin
          preload_from_hub:
          - ysdede/parakeet-tdt-0.6b-v2-onnx-tfjs4
          ---

          # Transformers.js v4 Parakeet TDT Demo

          Browser ASR demo using Parakeet TDT models.

          Synced from [ysdede/tdt-webgpu-demo](https://github.com/ysdede/tdt-webgpu-demo).

          Built in GitHub Actions from:

          - Demo repo: `ysdede/tdt-webgpu-demo`
          - Transformers source: `ysdede/transformers.js@v4-nemo-conformer-tdt-main-r2`
          READMEEOF

          # HF package.json: npm deps only (no local transformers)
          cat > hf_export/package.json << 'PKGEOF'
          {
            "name": "transformers-v4-parakeet-tdt-demo",
            "version": "1.0.0",
            "private": true,
            "type": "module",
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "preview": "vite preview"
            },
            "dependencies": {
              "@huggingface/transformers": "next",
              "react": "^18.2.0",
              "react-dom": "^18.2.0"
            },
            "devDependencies": {
              "@tailwindcss/forms": "^0.5.11",
              "@tailwindcss/typography": "^0.5.19",
              "@vitejs/plugin-react": "^4.0.0",
              "autoprefixer": "^10.4.27",
              "postcss": "^8.5.6",
              "tailwindcss": "^3.4.19",
              "vite": "^7.3.1",
              "vite-plugin-top-level-await": "^1.6.0",
              "vite-plugin-wasm": "^3.5.0"
            }
          }
          PKGEOF

          # HF vite.config.js: no local transformers path, ORT from node_modules
          cat > hf_export/vite.config.js << 'VITEEOF'
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react';
          import path from 'path';
          import fs from 'fs';
          import { createRequire } from 'module';

          const require = createRequire(import.meta.url);
          const basePath = process.env.VITE_BASE_PATH || '/';

          function ensureOrtRuntimeAssets(ortRoot, appRoot) {
            const distDir = path.join(ortRoot, 'dist');
            const publicOrtDir = path.join(appRoot, 'public', 'ort');
            const files = ['ort-wasm-simd-threaded.asyncify.mjs', 'ort-wasm-simd-threaded.asyncify.wasm'];
            if (!fs.existsSync(distDir)) return;
            fs.mkdirSync(publicOrtDir, { recursive: true });
            for (const name of files) {
              const src = path.join(distDir, name);
              const dst = path.join(publicOrtDir, name);
              if (fs.existsSync(src)) fs.copyFileSync(src, dst);
            }
          }

          let ortWeb = path.join(__dirname, 'node_modules', 'onnxruntime-web');
          try {
            ortWeb = path.dirname(require.resolve('onnxruntime-web/package.json', { paths: [__dirname] }));
          } catch (_) {}
          ensureOrtRuntimeAssets(ortWeb, __dirname);

          let transformersVersion = 'unknown';
          try {
            const pkg = require(path.join(__dirname, 'node_modules/@huggingface/transformers/package.json'));
            transformersVersion = pkg.version || 'unknown';
          } catch (_) {}

          export default defineConfig({
            plugins: [react()],
            base: basePath,
            server: {
              port: 5173,
              headers: {
                'Cross-Origin-Opener-Policy': 'same-origin',
                'Cross-Origin-Embedder-Policy': 'credentialless',
              },
            },
            define: {
              __TRANSFORMERS_VERSION__: JSON.stringify(transformersVersion),
              __TRANSFORMERS_SOURCE__: JSON.stringify('npm'),
            },
          });
          VITEEOF

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          SPACE_URL="https://ysdede:${HF_TOKEN}@huggingface.co/spaces/ysdede/tdt-webgpu-demo"
          if git clone --depth 1 "$SPACE_URL" space_repo 2>/dev/null; then
            rsync -a --delete --exclude='.git' hf_export/ space_repo/
            cd space_repo
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "Sync from GitHub (${GITHUB_SHA::7})"
              git push origin main
            fi
          else
            cd hf_export
            git init
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add -A
            git commit -m "Sync from GitHub (${GITHUB_SHA::7})"
            git branch -M main
            git remote add origin "$SPACE_URL"
            git push -u origin main
          fi
